<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>World Scientific Publishing - AI Sales Assistant</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
    .container{max-width:1400px;margin:0 auto}
    .header{background:#fff;padding:25px;border-radius:20px;box-shadow:0 10px 40px rgba(0,0,0,.1);margin-bottom:25px;text-align:center}
    .header h1{color:#2c3e50;font-size:2.5em;margin-bottom:10px;background:linear-gradient(135deg,#667eea,#764ba2);background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;color:transparent}
    .header p{color:#7f8c8d;font-size:1.2em}
    .status-indicator{display:inline-block;padding:8px 15px;background:#27ae60;color:#fff;border-radius:20px;font-size:.9em;margin-top:10px}
    .status-indicator.disconnected{background:#e74c3c}
    .query-section{background:#fff;padding:30px;border-radius:20px;box-shadow:0 10px 40px rgba(0,0,0,.1);margin-bottom:25px}
    .query-input-container{display:flex;gap:15px;margin-bottom:25px}
    .query-input{flex:1;padding:18px;border:2px solid #e0e6ed;border-radius:15px;font-size:16px;transition:.3s;background:#f8f9fa}
    .query-input:focus{outline:none;border-color:#667eea;box-shadow:0 0 0 4px rgba(102,126,234,.1);background:#fff}
    .query-btn{padding:18px 35px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;border-radius:15px;font-size:16px;font-weight:600;cursor:pointer;transition:.3s;box-shadow:0 5px 15px rgba(102,126,234,.3)}
    .query-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 25px rgba(102,126,234,.4)}
    .query-btn:disabled{opacity:.7;cursor:not-allowed}
    .sample-queries{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:15px;margin-top:20px}
    .sample-query{background:linear-gradient(135deg,#f8f9fa 0%,#e9ecef 100%);padding:15px 20px;border-radius:15px;cursor:pointer;transition:.3s;border:2px solid transparent;text-align:center}
    .sample-query:hover{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;transform:translateY(-3px);box-shadow:0 8px 25px rgba(102,126,234,.3)}
    .sample-query .emoji{font-size:1.5em;margin-right:10px}
    .dashboard{display:grid;grid-template-columns:1fr 1fr;gap:25px;margin-bottom:25px}
    .panel{background:#fff;padding:30px;border-radius:20px;box-shadow:0 10px 40px rgba(0,0,0,.1)}
    .panel-title{color:#2c3e50;font-size:1.6em;margin-bottom:25px;padding-bottom:15px;border-bottom:3px solid #667eea;display:flex;align-items:center;gap:10px}
    .insight-item{background:linear-gradient(135deg,#f8f9fa 0%,#e9ecef 100%);padding:18px;border-radius:12px;margin-bottom:15px;border-left:5px solid #667eea;transition:.3s}
    .insight-item:hover{transform:translateX(8px);box-shadow:0 5px 20px rgba(0,0,0,.1)}
    .data-table-container{max-height:500px;overflow-y:auto;border-radius:12px;border:1px solid #e9ecef}
    .data-table{width:100%;border-collapse:collapse}
    .data-table th{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:15px;text-align:left;position:sticky;top:0;z-index:10;font-weight:600}
    .data-table td{padding:15px;border-bottom:1px solid #e9ecef}
    .chart-panel{background:#fff;padding:30px;border-radius:20px;box-shadow:0 10px 40px rgba(0,0,0,.1);grid-column:1/-1}
    .chart-container{height:420px;display:flex;align-items:center;justify-content:center}
    .loading{display:flex;align-items:center;justify-content:center;padding:50px;color:#667eea;font-size:18px;font-weight:500}
    .loading::after{content:'';width:25px;height:25px;border:3px solid #667eea;border-top:3px solid transparent;border-radius:50%;animation:spin 1s linear infinite;margin-left:15px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .error{background:linear-gradient(135deg,#ffe6e6 0%,#ffcccc 100%);color:#d63031;padding:20px;border-radius:12px;border:2px solid #ff7675;text-align:center}
    .success{background:linear-gradient(135deg,#e6ffe6 0%,#ccffcc 100%);color:#27ae60;padding:20px;border-radius:12px;border:2px solid #00b894;text-align:center;margin-bottom:20px}
    .summary-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:25px}
    .stat-card{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:25px;border-radius:15px;text-align:center;box-shadow:0 5px 15px rgba(102,126,234,.3)}
    .stat-number{font-size:2.2em;font-weight:700;margin-bottom:8px}
    .stat-label{font-size:1em;opacity:.9}
    .priority-badge{padding:4px 12px;border-radius:20px;font-size:.8em;font-weight:600}
    .priority-high{background:#e74c3c;color:#fff}
    .priority-medium{background:#f39c12;color:#fff}
    .priority-low{background:#95a5a6;color:#fff}
    @media(max-width:768px){.dashboard{grid-template-columns:1fr}.query-input-container{flex-direction:column}}
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🚀 Publishing Company</h1>
      <p>AI-Enhanced Sales & Marketing Assistant (DB-first)</p>
      <div id="connection-status" class="status-indicator">🔄 Connecting...</div>
    </div>

    <div class="query-section">
      <div class="query-input-container">
        <input id="queryInput" class="query-input" placeholder="Try: APAC subscriptions 2022-2024, or Compare NTU and NUS 2023" onkeypress="handleKeyPress(event)"/>
        <button id="queryBtn" class="query-btn" onclick="processQuery()">🔍 Analyze</button>
        <button id="aiButton" class="query-btn">✨ Generate AI Insights</button>
      </div>
      <div class="sample-queries">
        <div class="sample-query" onclick="setQuery('Sales team visiting China which universities to be prioritised in 2024')"><span class="emoji">🇨🇳</span>China (2024)</div>
        <div class="sample-query" onclick="setQuery('Show APAC subscriptions 2022-2024 and whether universities are subscribed or not')"><span class="emoji">🌏</span>APAC Subs (2022–2024)</div>
        <div class="sample-query" onclick="setQuery('Compare NTU and NUS performance since 2022')"><span class="emoji">⚖️</span>NTU vs NUS (since 2022)</div>
        <div class="sample-query" onclick="setQuery('Top 10 most productive authors in Americas in 2024')"><span class="emoji">👥</span>Top Authors (Americas, 2024)</div>
        <div class="sample-query" onclick="setQuery('Revenue performance analysis by country in EMEA since 2023')"><span class="emoji">💰</span>Revenue (EMEA, since 2023)</div>
      </div>
    </div>

    <div id="results-section" style="display:none">
      <div id="success-message"></div>
      <div id="summary-stats" class="summary-stats"></div>
      <div class="dashboard">
        <div class="panel">
          <h2 class="panel-title">💡 Insights</h2>
          <div id="insights-container"></div>
          <div id="insightsPanel"></div>
        </div>
        <div class="panel">
          <h2 class="panel-title">📋 Data Results</h2>
          <div id="data-container" class="data-table-container"></div>
          <div id="dataPanel" class="data-table-container"></div>
        </div>
      </div>
      <div class="chart-panel">
        <h2 class="panel-title">📈 Visualization</h2>
        <div class="chart-container"><canvas id="dataChart"></canvas></div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE_URL = 'http://127.0.0.1:5000/api';
    let currentChart = null;
    window.__lastFilters = {};

    document.addEventListener('DOMContentLoaded', checkBackendConnection);

    async function checkBackendConnection(){
      const el = document.getElementById('connection-status');
      try {
        const r = await fetch(`${API_BASE_URL}/health`);
        const j = await r.json();
        el.textContent = j.status === 'healthy' ? '✅ Ready' : '⚠️ Partial';
        el.className = 'status-indicator' + (j.status === 'healthy' ? '' : '');
      } catch {
        el.textContent = '❌ Disconnected';
        el.className = 'status-indicator disconnected';
      }
    }

    function setQuery(q){ document.getElementById('queryInput').value = q; processQuery(); }
    function handleKeyPress(e){ if (e.key === 'Enter') processQuery(); }

    async function processQuery(){
      const q = document.getElementById('queryInput').value.trim();
      const btn = document.getElementById('queryBtn');
      if(!q){ alert('Please enter a query'); return; }
      btn.disabled = true; btn.textContent = '⏳ Processing...'; showLoading();

      try{
        const r = await fetch(`${API_BASE_URL}/query`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ query: q })
        });
        const data = await r.json();
        if(data.success){
          window.__lastFilters = data.detected_filters || {};
          displayResults(data.results, q);
        } else {
          showError(data.error || 'Unknown error');
        }
      } catch(e){
        console.error(e);
        showError('Failed to connect to backend');
      } finally {
        btn.disabled = false; btn.textContent = '🔍 Analyze';
      }
    }

    function showLoading(){
      document.getElementById('results-section').style.display = 'block';
      document.getElementById('insights-container').innerHTML = '<div class="loading">Generating insights…</div>';
      document.getElementById('data-container').innerHTML = '<div class="loading">Loading data…</div>';
    }

    function showError(msg){
      document.getElementById('results-section').style.display = 'block';
      document.getElementById('insights-container').innerHTML = `<div class="error">${msg}</div>`;
      document.getElementById('data-container').innerHTML = '';
      document.getElementById('summary-stats').innerHTML = '';
    }

    function displayResults(results, q){
      document.getElementById('results-section').style.display = 'block';
      const summaryEl = document.getElementById('success-message');
      summaryEl.innerHTML = `<div class="success"><strong>✅ Analysis Complete</strong><br/>Query: "${q}"<br/>${results.summary}</div>`;

      // Show detected filter chips
      const df = (window.__lastFilters || {});
      if (df.years || df.region || (df.countries && df.countries.length)) {
        const chips = [];
        if (df.years) {
          if (df.years.mode === 'eq') chips.push(`Year: ${df.years.year}`);
          else chips.push(`Years: ${df.years.from}–${df.years.to === 9999 ? 'present' : df.years.to}`);
        }
        if (df.region) chips.push(`Region: ${df.region.value}`);
        if (df.countries && df.countries.length) chips.push(`Countries: ${df.countries.join(', ')}`);
        summaryEl.innerHTML += `<div style="margin-top:10px">${chips.map(c => `<span style="background:#eef;padding:6px 10px;border-radius:12px;margin-right:8px">${c}</span>`).join('')}</div>`;
      }

      displaySummaryStats(results);
      displayInsights(results.insights || []);
      displayData(results.data || []);
      if(results.visualization) displayVisualization(results.visualization);
    }

    function displaySummaryStats(results){
      const data = results.data || [];
      let html = `
        <div class="stat-card"><div class="stat-number">${data.length}</div><div class="stat-label">Total Records</div></div>
        <div class="stat-card"><div class="stat-number">${results.query_type || 'General'}</div><div class="stat-label">Analysis Type</div></div>
        <div class="stat-card"><div class="stat-number">📈</div><div class="stat-label">${results.ai_context || 'Data-driven summary'}</div></div>
      `;
      document.getElementById('summary-stats').innerHTML = html;
    }

    function displayInsights(list){
      const c = document.getElementById('insights-container');
      if(!list || list.length === 0){
        c.innerHTML = '<div class="insight-item">No insights available.</div>'; return;
      }
      c.innerHTML = list.map(x => `<div class="insight-item">${x}</div>`).join('');
    }

    function displayData(rows){
      const c = document.getElementById('data-container');
      if(!rows || rows.length === 0){ c.innerHTML = '<div class="error">No data found.</div>'; return; }
      const headers = Object.keys(rows[0]);
      let html = `<table class="data-table"><thead><tr>${headers.map(h=>`<th>${formatHeader(h)}</th>`).join('')}</tr></thead><tbody>`;
      html += rows.slice(0, 50).map(r => `<tr>${headers.map(h=>`<td>${formatValue(r[h], h)}</td>`).join('')}</tr>`).join('');
      html += '</tbody></table>';
      if(rows.length > 50) html += `<p style="text-align:center;padding:12px;color:#666;font-style:italic">Showing first 50 of ${rows.length} records</p>`;
      c.innerHTML = html;
    }
    function displayVisualization(viz){
      const canvas = document.getElementById('dataChart');
      if(currentChart) { currentChart.destroy(); currentChart = null; }
      if(!viz || !viz.data || viz.data.length === 0) return;

      const labelField = viz.label_field;
      const valueField = viz.value_field;
      const valueLabel = viz.value_label || 'Value';
      const top = viz.data;

      const pickLabel = (row) => labelField && row[labelField] != null ? String(row[labelField]) : String(Object.values(row)[0]);
      const pickValue = (row) => {
        if(valueField && row[valueField] != null){
          const v = Number(row[valueField]); return isNaN(v) ? 0 : v;
        }
        for(const val of Object.values(row)){
          const n = Number(val); if(!isNaN(n)) return n;
        }
        return 0;
      };

      const labels = top.map(r => truncate(pickLabel(r), 32));
      const data = top.map(r => pickValue(r));

      const ctx = canvas.getContext('2d');
      currentChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            label: valueLabel,
            data,
            borderWidth: 2,
            borderRadius: 8,
            backgroundColor: 'rgba(102,126,234,0.85)',
            borderColor: 'rgba(102,126,234,1)'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: true },
            tooltip: {
              callbacks: {
                label: (ctx)=> `${valueLabel}: ${Number(ctx.parsed.y).toLocaleString()}`
              }
            },
            title: { display: true, text: readableTitleFromLabels(labels) }
          },
          scales: {
            x: {
              ticks: { maxRotation: 45, minRotation: 0, autoSkip: false }
            },
            y: {
              beginAtZero: true,
              ticks: { callback: (v)=> Number(v).toLocaleString() }
            }
          }
        }
      });
    }

    function formatHeader(h){ return h.replace(/_/g,' ').replace(/\b\w/g, c=>c.toUpperCase()); }
    function formatValue(v, h){
      if(v === null || v === undefined) return '-';
      const s = String(v);
      if(h.toLowerCase().includes('priority')){
        const low = s.toLowerCase();
        if(low.includes('high')) return `<span class="priority-badge priority-high">${s}</span>`;
        if(low.includes('medium')) return `<span class="priority-badge priority-medium">${s}</span>`;
        if(low.includes('low')) return `<span class="priority-badge priority-low">${s}</span>`;
      }
      if(typeof v === 'number') return v.toLocaleString();
      if(s.length > 120) return s.slice(0,120) + '…';
      return s;
    }
    function truncate(t, n){ return t.length > n ? t.slice(0, n-1) + '…' : t; }
    function readableTitleFromLabels(labels){
      if(!labels || labels.length === 0) return 'Visualization';
      return labels.length === 1 ? labels[0] : `Top ${labels.length} Items`;
    }

document.getElementById("aiButton").addEventListener("click", async () => {
  const query = document.getElementById("queryInput").value.trim();
  if (!query) {
    alert("Please enter a query first");
    return;
  }

  const sampleData = window.__lastResults || [];

  try {
    const res = await fetch(`${API_BASE_URL}/ai-insight`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query, data: sampleData }),
    });

    const json = await res.json();

    const panel = document.getElementById("insights-container");
    panel.innerHTML = "<h3>✨ AI-Powered Insights</h3>";

    if (json.success && json.insights) {
      panel.innerHTML += json.insights
        .map(i => `<div class="insight-item">${i}</div>`)
        .join("");
    } else {
      panel.innerHTML += `<p class="error">Error: ${json.error}</p>`;
    }
  } catch (err) {
    console.error("AI error", err);
    document.getElementById("insights-container").innerHTML =
      `<p class="error">Failed to fetch AI insights</p>`;
  }
});



  </script>
</body>
</html>
